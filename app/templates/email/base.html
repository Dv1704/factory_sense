<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1a202c;
            margin: 0;
            padding: 0;
            background-color: #f7fafc;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .header {
            background-color: #2d3748;
            color: #ffffff;
            padding: 24px;
            text-align: center;
        }
        .content {
            padding: 32px;
        }
        .footer {
            background-color: #edf2f7;
            color: #718096;
            padding: 16px;
            text-align: center;
            font-size: 12px;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #4299e1;
            color: #ffffff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 16px;
        }
        .token {
            display: inline-block;
            padding: 12px 24px;
            background-color: #f1f5f9;
            border: 1px dashed #cbd5e0;
            border-radius: 6px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="margin:0;">FactorySenseAI</h1>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            &copy; {{ current_year }} FactorySenseAI. All rights reserved.<br>
            Industrial Intelligence for Modern Manufacturing.
        </div>
    </div>
</body>
</html>
